name: Tự động lọc link khi xem_football có cập nhật

on:
  workflow_run:
    workflows: ["Tín hiệu kích hoạt từ xem_football"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-save:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 5

    steps:
      # 1. Kéo mã nguồn của chính kho xembongda về
      - name: Checkout kho xembongda
        uses: actions/checkout@v4

      # 2. KÉO THẲNG KHO xem_football VỀ Ổ CỨNG (Vì là Public nên không cần Token)
      - name: Checkout kho xem_football để lấy file trực tiếp
        uses: actions/checkout@v4
        with:
          repository: huybuonvp/xem_football
          path: xem_football_folder # Tải toàn bộ kho xem_football vào thư mục này

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 3. Chạy mã kiểm tra live (Đọc trực tiếp từ ổ cứng)
      - name: Chạy mã kiểm tra live
        run: python check_live.py

      - name: Cấu hình Git hệ thống
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tự cập nhật TVlive.m3u lên kho xembongda
        run: |
          git add TVlive.m3u
          if ! git diff --cached --quiet; then
            git commit -m "GitHub Actions: Đồng bộ siêu tốc TVlive.m3u [skip ci]"
            git push origin main
            echo "Đã push thành công!"
          else
            echo "Nội dung kênh không thay đổi."
          fi
