name: Tự động lọc link khi xem_football có cập nhật

on:
  repository_dispatch:
    types: [pc_updated_files] # Lắng nghe tín hiệu mang tên "pc_updated_files" từ kho xem_football gửi sang
  workflow_dispatch: # Giữ nút này để bấm chạy bằng tay khi cần test

permissions:
  contents: write # Quyền tự ghi file sạch vào chính nó mà không cần TOKEN cấu hình tay

jobs:
  check-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout mã nguồn kho xembongda
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện cần thiết
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Chạy mã kiểm tra live để sinh ra file TVlive.m3u sạch
        run: python check_live.py

      - name: Cấu hình Git hệ thống
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tự cập nhật TVlive.m3u lên kho xembongda
        run: |
          git add TVlive.m3u
          if ! git diff --cached --quiet; then
            git commit -m "GitHub Actions: Nhận tín hiệu từ xem_football - Cập nhật TVlive.m3u [skip ci]"
            git push origin main
            echo "Đã push file TVlive.m3u thành công!"
          else
            echo "Nội dung kênh không có sự thay đổi."
          fi
