name: Tự động lọc link khi xem_football có cập nhật

on:
  workflow_run:
    workflows: ["Tín hiệu kích hoạt từ xem_football"] # Tên chính xác của file workflow bên kho xem_football
    types:
      - completed # Thức dậy chạy ngay khi file kích hoạt bên kia vừa chạy xong
  workflow_dispatch: # Nút bấm chạy bằng tay để test

permissions:
  contents: write # Quyền tự ghi file sạch vào chính nó (Không cần Token)

jobs:
  check-and-save:
    runs-on: ubuntu-latest
    # Chỉ chạy nếu workflow bên kho xem_football chạy thành công tốt đẹp
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 10

    steps:
      - name: Checkout mã nguồn kho xembongda
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện cần thiết
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Chạy mã kiểm tra live để sinh ra file TVlive.m3u sạch
        run: python check_live.py

      - name: Cấu hình Git hệ thống
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tự cập nhật TVlive.m3u lên kho xembongda
        run: |
          git add TVlive.m3u
          if ! git diff --cached --quiet; then
            git commit -m "GitHub Actions: Đồng bộ TVlive.m3u theo xem_football [skip ci]"
            git push origin main
            echo "Đã push file TVlive.m3u thành công không cần Token!"
          else
            echo "Nội dung kênh không có sự thay đổi."
          fi
