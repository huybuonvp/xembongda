name: Tự động lọc link khi xem_football có cập nhật

on:
  workflow_dispatch: # Đón nhận lệnh kích hoạt tức thì từ lệnh curl của kho xem_football
                     # Đồng thời giữ lại nút bấm trên giao diện web để bạn test thủ công

permissions:
  contents: write # Quyền tự ghi file sạch TVlive.m3u vào chính nó (Không cần Token)

jobs:
  check-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. Kéo mã nguồn của chính kho xembongda về máy chủ ảo
      - name: Checkout kho xembongda
        uses: actions/checkout@v4

      # 2. Kéo kho xem_football về ổ cứng cục bộ để Python đọc trực tiếp (Mất 0.01s)
      - name: Checkout kho xem_football để lấy file trực tiếp
        uses: actions/checkout@v4
        with:
          repository: huybuonvp/xem_football
          path: xem_football_folder

      # 3. Tạo file requirements.txt mồi để làm căn cứ nạp bộ nhớ đệm
      - name: Khởi tạo file requirements.txt mồi
        run: echo "requests==2.32.3" > requirements.txt

      # 4. Khởi tạo Python và nạp Cache thư viện cũ
      - name: Cài đặt Python và Bật Cache Pip
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 5. Cài đặt thư viện nâng cao (sử dụng cache siêu tốc)
      - name: Cài đặt thư viện nâng cao
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 6. Chạy mã kiểm tra live giữ nguyên 100% thứ tự thời gian gốc (~30 giây)
      - name: Chạy mã kiểm tra live siêu tốc
        run: python check_live.py

      # 7. Thiết lập danh tính Git hệ thống
      - name: Cấu hình Git hệ thống
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # 8. Tự động đẩy file TVlive.m3u sạch lên hệ thống
      - name: Tự cập nhật TVlive.m3u lên kho xembongda
        run: |
          git add TVlive.m3u
          if ! git diff --cached --quiet; then
            git commit -m "GitHub Actions: Đồng bộ siêu tốc TVlive.m3u [skip ci]"
            git push origin main
            echo "[SUCCESS] Đã cập nhật file TVlive.m3u thành công!"
          else
            echo "[INFO] Kênh không có sự thay đổi. Bỏ qua push."
          fi
